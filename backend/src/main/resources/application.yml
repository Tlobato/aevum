spring:
  application:
    name: Aevum
  config:
    import: optional:file:.env.properties

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/aevum_db}
    username: ${DB_USERNAME:aevum}
    password: ${DB_PASSWORD:aevum_secret}
    driver-class-name: org.postgresql.Driver
  
  mail:
    host: ${MAIL_HOST:sandbox.smtp.mailtrap.io}
    port: ${MAIL_PORT:2525}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${CLERK_ISSUER_URI:https://enjoyed-airedale-42.clerk.accounts.dev}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8080

aws:
  s3:
    bucket: ${AWS_BUCKET:aevum-storage-bucket}
    region: ${AWS_REGION:us-east-1}
    endpoint: ${AWS_ENDPOINT:http://localhost:4566}
    access-key: ${AWS_ACCESS_KEY:test}
    secret-key: ${AWS_SECRET_KEY:test}

stripe:
  secret-key: ${STRIPE_SECRET_KEY:}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:}

aevum:
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  admin-emails: ${AEVUM_ADMIN_EMAILS:}
