spring:
  application:
    name: Aevum

  datasource:
    url: jdbc:postgresql://localhost:5432/aevum_db
    username: aevum
    password: aevum_secret
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update        # cria/atualiza tabelas automaticamente
    show-sql: true            # mostra SQL no console durante dev
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8080

# CORS — libera o front Next.js em desenvolvimento
allowed:
  origins: "http://localhost:3000"
