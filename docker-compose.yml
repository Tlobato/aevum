version: '3.9'

# ============================================================
# MODO DE USO:
#
# Desenvolvimento local (apenas infra — backend/frontend rodam via IDE):
#   docker compose up
#
# Staging completo (toda a stack em container):
#   docker compose --profile full up --build
# ============================================================

services:

  # ──────────────────────────────────────────────────────────
  # INFRAESTRUTURA (sempre disponível no dev local)
  # ──────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: aevum-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: aevum_db
      POSTGRES_USER: aevum
      POSTGRES_PASSWORD: aevum_secret
    ports:
      - "5432:5432"
    volumes:
      - aevum_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aevum -d aevum_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  localstack:
    image: localstack/localstack:3
    container_name: aevum-localstack
    restart: unless-stopped
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3
      - DEBUG=0
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
    volumes:
      - aevum_localstack_data:/var/lib/localstack
      - ./infra/localstack-init.sh:/etc/localstack/init/ready.d/init-aws.sh
    healthcheck:
      test: ["CMD", "awslocal", "s3", "ls"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ──────────────────────────────────────────────────────────
  # APLICAÇÃO (apenas no perfil "full" — staging local)
  # ──────────────────────────────────────────────────────────

  backend:
    profiles: ["full"]
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aevum-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - ./backend/.env.properties   # nunca vai pro GitHub
    environment:
      # Sobrescreve a URL do banco para apontar para o container postgres
      DB_URL: jdbc:postgresql://postgres:5432/aevum_db
      # Localstack acessível via nome do container
      AWS_ENDPOINT: http://localstack:4566
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy

  frontend:
    profiles: ["full"]
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Variáveis públicas do Next.js precisam ser injetadas em build time
        NEXT_PUBLIC_API_URL: http://localhost:8080
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
        NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}
        NEXT_PUBLIC_ADMIN_EMAILS: ${NEXT_PUBLIC_ADMIN_EMAILS}
    container_name: aevum-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  aevum_pg_data:
    driver: local
  aevum_localstack_data:
    driver: local
